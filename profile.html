<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE - PREMIUM EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f5ff;
            --secondary: #ff00aa;
            --accent: #00ff88;
            --warning: #ffff00;
            --danger: #ff0066;
            --dark: #0a0a0f;
            --darker: #050510;
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: var(--dark);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            color: #fff;
            user-select: none;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ambient-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(0, 245, 255, .08) 0%, transparent 50%), 
                        radial-gradient(circle at 20% 80%, rgba(255, 0, 170, .05) 0%, transparent 40%), 
                        radial-gradient(circle at 80% 20%, rgba(0, 255, 136, .05) 0%, transparent 40%);
            pointer-events: none;
        }

        .grid-floor {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to top, rgba(0, 245, 255, .1) 0%, transparent 100%), 
                        repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(0, 245, 255, .03) 100px, rgba(0, 245, 255, .03) 101px), 
                        repeating-linear-gradient(0deg, transparent, transparent 100px, rgba(0, 245, 255, .03) 100px, rgba(0, 245, 255, .03) 101px);
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            pointer-events: none;
        }

        .main-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 2rem;
            transition: all .6s ease;
        }

        .main-content.hidden {
            opacity: 0;
            transform: scale(.9);
            pointer-events: none;
        }

        .title-section { text-align: center; }

        .glitch-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary), 0 0 40px var(--primary);
            letter-spacing: .2em;
            position: relative;
            animation: glitch 3s infinite;
        }

        .glitch-title::before, .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .glitch-title::before {
            color: var(--secondary);
            animation: glitch-1 .3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .glitch-title::after {
            color: var(--accent);
            animation: glitch-2 .3s infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitch { 0%, 90%, 100% { opacity: 1 } 92%, 94%, 96% { opacity: .8 } }
        @keyframes glitch-1 { 0%, 100% { transform: translate(0) } 25% { transform: translate(-3px, 2px) } 50% { transform: translate(3px, -2px) } 75% { transform: translate(-2px, 1px) } }
        @keyframes glitch-2 { 0%, 100% { transform: translate(0) } 25% { transform: translate(3px, -2px) } 50% { transform: translate(-3px, 2px) } 75% { transform: translate(2px, -1px) } }

        .subtitle { font-size: 1rem; letter-spacing: .5em; color: rgba(255, 255, 255, .5); margin-top: .5rem; }

        .menu-options { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 500px; }
        .difficulty-selector, .mode-selector { display: flex; flex-direction: column; align-items: center; gap: .75rem; }
        .diff-label, .mode-label { font-family: 'Orbitron', monospace; font-size: .75rem; letter-spacing: .3em; color: rgba(255, 255, 255, .5); }
        .diff-buttons, .mode-buttons { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; }

        .diff-btn, .mode-btn {
            padding: .5rem 1rem;
            font-family: 'Orbitron', monospace;
            font-size: .75rem;
            color: rgba(255, 255, 255, .6);
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            cursor: pointer;
            transition: all .3s ease;
        }

        .diff-btn:hover, .mode-btn:hover { background: rgba(0, 245, 255, .1); border-color: var(--primary); color: #fff; }
        .diff-btn.active, .mode-btn.active {
            background: linear-gradient(135deg, rgba(0, 245, 255, .2), rgba(0, 136, 255, .2));
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 245, 255, .3);
        }

        .start-btn {
            position: relative;
            padding: 1.25rem 3rem;
            font-family: 'Orbitron', monospace;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: .3em;
            color: #fff;
            background: transparent;
            border: none;
            cursor: pointer;
            overflow: hidden;
            transition: all .3s ease;
        }

        .btn-bg { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0, 245, 255, .1), rgba(0, 136, 255, .05)); backdrop-filter: blur(10px); }
        .btn-border { position: absolute; inset: 0; border: 2px solid transparent; background: linear-gradient(var(--dark), var(--dark)) padding-box, linear-gradient(135deg, var(--primary), var(--secondary)) border-box; }
        .btn-glow { position: absolute; inset: -2px; background: linear-gradient(135deg, var(--primary), var(--secondary)); opacity: 0; filter: blur(15px); transition: opacity .3s ease; }
        .btn-text { position: relative; z-index: 2; }
        .start-btn:hover .btn-glow { opacity: .6; }

        .game-world {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease;
        }

        .game-world.active { opacity: 1; pointer-events: all; }

        #gameCanvas {
            display: block;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 245, 255, .2);
        }

        .hud {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            font-family: 'Orbitron', monospace;
            z-index: 50;
            background: linear-gradient(to bottom, rgba(0, 0, 0, .8), transparent);
            pointer-events: none;
        }

        .hud-value { font-size: 1.5rem; color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .hud-label { font-size: .6rem; color: rgba(255, 255, 255, .5); letter-spacing: .2em; }

        .overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, .9);
            opacity: 0; pointer-events: none; transition: opacity .3s ease; z-index: 100;
        }
        .overlay.active { opacity: 1; pointer-events: all; }

        .game-btn {
            padding: 1rem 2.5rem;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none; color: #fff; cursor: pointer; transition: .3s;
        }

        .mobile-controls {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            display: none; grid-template-areas: ". up ." "left . right" ". down ." ". pause .";
            gap: 10px; z-index: 60;
        }
        .mobile-controls.visible { display: grid; }
        .control-btn { width: 60px; height: 50px; background: rgba(0, 245, 255, .1); border: 2px solid var(--primary); color: #fff; border-radius: 8px; }

        .author-footer {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); z-index: 5;
        }
        
        /* Estilos específicos para partículas */
        #particleCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

<div class="container">
    <div class="ambient-bg"></div>
    <div class="grid-floor"></div>

    <div class="main-content" id="mainContent">
        <div class="title-section">
            <h1 class="glitch-title" data-text="SNAKE">SNAKE</h1>
            <p class="subtitle">PREMIUM EDITION</p>
        </div>

        <div class="menu-options">
            <div class="difficulty-selector">
                <span class="diff-label">DIFICULTAD</span>
                <div class="diff-buttons">
                    <button class="diff-btn" data-speed="120">FÁCIL</button>
                    <button class="diff-btn active" data-speed="80">NORMAL</button>
                    <button class="diff-btn" data-speed="50">DIFÍCIL</button>
                    <button class="diff-btn" data-speed="30">INSANO</button>
                </div>
            </div>
            <div class="mode-selector">
                <span class="mode-label">MODO DE JUEGO</span>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="classic">CLÁSICO</button>
                    <button class="mode-btn" data-mode="noWalls">SIN MUROS</button>
                    <button class="mode-btn" data-mode="obstacles">OBSTÁCULOS</button>
                </div>
            </div>
        </div>

        <button class="start-btn" id="startBtn">
            <span class="btn-bg"></span>
            <span class="btn-border"></span>
            <span class="btn-glow"></span>
            <span class="btn-text">PRESS START</span>
        </button>

        <div class="stats-display" style="display: flex; gap: 2rem;">
            <div class="stat-item">
                <span class="stat-label">HIGH SCORE</span>
                <span class="stat-value" id="menuHighScore">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">PARTIDAS</span>
                <span class="stat-value" id="menuGamesPlayed">0</span>
            </div>
        </div>
    </div>

    <div class="game-world" id="gameWorld">
        <div class="hud">
            <div class="hud-item"><span class="hud-label">SCORE</span><br><span class="hud-value" id="scoreDisplay">0</span></div>
            <div class="hud-item" style="text-align: center;"><span class="hud-label">LEVEL</span><br><span class="hud-value" id="levelDisplay">1</span></div>
            <div class="hud-item" style="text-align: right;"><span class="hud-label">HIGH</span><br><span class="hud-value" id="highScoreDisplay">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>

        <div class="overlay" id="countdownOverlay"><span style="font-size: 8rem; color: var(--primary);" id="countdownNumber">3</span></div>
        
        <div class="overlay" id="pauseOverlay">
            <h2 style="font-family: Orbitron; font-size: 3rem; color: var(--primary);">PAUSADO</h2>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button class="game-btn" id="resumeBtn">REANUDAR</button>
                <button class="game-btn" id="pauseMenuBtn" style="background: transparent; border: 1px solid #fff;">MENÚ</button>
            </div>
        </div>

        <div class="overlay" id="gameOver">
            <h2 style="font-family: Orbitron; font-size: 3rem; color: var(--danger);">GAME OVER</h2>
            <div id="finalScoreDisplay" style="margin: 1.5rem 0; text-align: center;">
                <p class="hud-label">PUNTUACIÓN FINAL</p>
                <p class="hud-value" id="finalScore" style="font-size: 3rem;">0</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="game-btn" id="restartBtn">VOLVER A JUGAR</button>
                <button class="game-btn" id="menuBtn" style="background: transparent; border: 1px solid #fff;">MENÚ</button>
            </div>
        </div>

        <div class="mobile-controls" id="mobileControls">
            <button class="control-btn up" style="grid-area: up;" id="btnUp">▲</button>
            <button class="control-btn left" style="grid-area: left;" id="btnLeft">◄</button>
            <button class="control-btn right" style="grid-area: right;" id="btnRight">►</button>
            <button class="control-btn down" style="grid-area: down;" id="btnDown">▼</button>
            <button class="control-btn pause" style="grid-area: pause;" id="btnPause">PAUSE</button>
        </div>
    </div>

    <canvas id="particleCanvas"></canvas>

    <footer class="author-footer">
        Created by <strong>Oathan Rex</strong>
    </footer>
</div>

<script>
/** * CONFIGURACIÓN Y UTILIDADES 
 */
const CONFIG = Object.freeze({
    GRID: { SIZE: 20, PADDING: 40 },
    SNAKE: { INITIAL_LENGTH: 3, GROWTH_PER_FOOD: 1 },
    SPEED: { EASY: 120, NORMAL: 80, HARD: 50, INSANE: 30, SPEED_INCREASE_PER_LEVEL: 5, MIN_SPEED: 25 },
    SCORING: { FOOD_BASE: 10, LEVEL_BONUS: 100, SPECIAL_FOOD_MULTIPLIER: 5 },
    LEVELS: { FOOD_PER_LEVEL: 5 },
    FOOD: {
        NORMAL: { color: "#00ffff", points: 1 },
        BONUS: { color: "#ffff00", points: 3, duration: 5000 },
        SUPER: { color: "#ff00ff", points: 5, duration: 3000 },
        SPEED: { color: "#00ff00", points: 2, duration: 4000, effect: "slow" }
    },
    STORAGE: { HIGH_SCORE: "snake_highScore", GAMES_PLAYED: "snake_gamesPlayed", SETTINGS: "snake_settings" }
});

const Utils = {
    clamp: (v, min, max) => Math.max(min, Math.min(max, v)),
    randomInt: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
    getElement: (id) => document.getElementById(id),
    toRgba(color, alpha = 1) {
        if (color.startsWith("#")) {
            const r = parseInt(color.slice(1, 3), 16), g = parseInt(color.slice(3, 5), 16), b = parseInt(color.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }
        return color;
    },
    storage: {
        get: (key, def) => { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } },
        set: (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
    },
    isMobile: () => /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768
};

/**
 * SISTEMA DE PARTÍCULAS
 */
class ParticleSystem {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext("2d");
        this.particles = [];
        this.resize();
        window.addEventListener("resize", () => this.resize());
    }
    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
    emit(x, y, count, color) {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 200 + 50;
            this.particles.push({
                x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                life: 1000, maxLife: 1000, size: Math.random() * 5 + 2, color: color || "#00f5ff"
            });
        }
    }
    update(dt) {
        this.particles = this.particles.filter(p => {
            p.x += p.vx * dt; p.y += p.vy * dt;
            p.life -= dt * 1000;
            return p.life > 0;
        });
    }
    draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.particles.forEach(p => {
            this.ctx.globalAlpha = p.life / p.maxLife;
            this.ctx.fillStyle = p.color;
            this.ctx.beginPath();
            this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            this.ctx.fill();
        });
        this.ctx.globalAlpha = 1;
    }
}

/**
 * LÓGICA DEL JUEGO
 */
class SnakeGame {
    constructor(canvas, options) {
        this.canvas = canvas;
        this.ctx = canvas.getContext("2d");
        this.baseSpeed = options.speed;
        this.gameMode = options.mode;
        this.callbacks = options;
        this.gridSize = CONFIG.GRID.SIZE;
        this.input = { direction: "right", next: [] };
        this.setupInput();
        this.resize();
        this.init();
    }

    setupInput() {
        const handleKey = (e) => {
            const keys = { ArrowUp: "up", w: "up", ArrowDown: "down", s: "down", ArrowLeft: "left", a: "left", ArrowRight: "right", d: "right" };
            const dir = keys[e.key];
            if (dir) this.setDirection(dir);
        };
        document.addEventListener("keydown", handleKey);
    }

    setDirection(dir) {
        const opposites = { up: "down", down: "up", left: "right", right: "left" };
        if (opposites[dir] !== this.input.direction) this.input.direction = dir;
    }

    resize() {
        const container = this.canvas.parentElement;
        this.cols = Math.floor((container.clientWidth - 40) / this.gridSize);
        this.rows = Math.floor((container.clientHeight - 150) / this.gridSize);
        this.canvas.width = this.cols * this.gridSize;
        this.canvas.height = this.rows * this.gridSize;
    }

    init() {
        this.snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
        this.score = 0;
        this.level = 1;
        this.food = this.spawnFood();
        this.obstacles = this.gameMode === "obstacles" ? this.spawnObstacles() : [];
        this.state = "ready";
        this.currentSpeed = this.baseSpeed;
    }

    spawnFood() {
        return { x: Utils.randomInt(0, this.cols - 1), y: Utils.randomInt(0, this.rows - 1), pulse: 0 };
    }

    spawnObstacles() {
        let obs = [];
        for(let i=0; i<10; i++) obs.push({x: Utils.randomInt(0, this.cols-1), y: Utils.randomInt(0, this.rows-1)});
        return obs;
    }

    update() {
        if (this.state !== "playing") return;
        
        const head = { ...this.snake[0] };
        if (this.input.direction === "up") head.y--;
        if (this.input.direction === "down") head.y++;
        if (this.input.direction === "left") head.x--;
        if (this.input.direction === "right") head.x++;

        // Colisiones
        if (this.gameMode === "classic" || this.gameMode === "obstacles") {
            if (head.x < 0 || head.x >= this.cols || head.y < 0 || head.y >= this.rows) return this.gameOver();
        } else {
            if (head.x < 0) head.x = this.cols - 1;
            if (head.x >= this.cols) head.x = 0;
            if (head.y < 0) head.y = this.rows - 1;
            if (head.y >= this.rows) head.y = 0;
        }

        if (this.snake.some(s => s.x === head.x && s.y === head.y)) return this.gameOver();
        if (this.obstacles.some(o => o.x === head.x && o.y === head.y)) return this.gameOver();

        this.snake.unshift(head);

        if (head.x === this.food.x && head.y === this.food.y) {
            this.score += CONFIG.SCORING.FOOD_BASE * this.level;
            this.food = this.spawnFood();
            this.callbacks.onFoodEaten(this.food);
            if (this.snake.length % 5 === 0) {
                this.level++;
                this.currentSpeed = Math.max(this.currentSpeed - 5, 30);
                this.callbacks.onLevelUp(this.level);
            }
            this.callbacks.onScoreChange(this.score, this.snake.length);
        } else {
            this.snake.pop();
        }
    }

    draw() {
        this.ctx.fillStyle = "rgba(10, 10, 15, 0.8)";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

        // Comida
        this.ctx.fillStyle = "#00f5ff";
        this.ctx.shadowBlur = 15;
        this.ctx.shadowColor = "#00f5ff";
        this.ctx.beginPath();
        this.ctx.arc(this.food.x * this.gridSize + 10, this.food.y * this.gridSize + 10, 8, 0, Math.PI*2);
        this.ctx.fill();

        // Obstáculos
        this.ctx.fillStyle = "#ff0066";
        this.obstacles.forEach(o => {
            this.ctx.fillRect(o.x * this.gridSize + 2, o.y * this.gridSize + 2, this.gridSize - 4, this.gridSize - 4);
        });

        // Snake
        this.snake.forEach((s, i) => {
            this.ctx.fillStyle = i === 0 ? "#00ff88" : "#00aa77";
            this.ctx.shadowBlur = i === 0 ? 20 : 0;
            this.ctx.fillRect(s.x * this.gridSize + 1, s.y * this.gridSize + 1, this.gridSize - 2, this.gridSize - 2);
        });
        this.ctx.shadowBlur = 0;
    }

    gameOver() {
        this.state = "gameOver";
        this.callbacks.onGameOver({ score: this.score });
    }

    start() {
        this.state = "playing";
        let lastTime = 0;
        const loop = (time) => {
            if (this.state !== "playing") return;
            if (time - lastTime > this.currentSpeed) {
                this.update();
                this.draw();
                lastTime = time;
            }
            requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }
}

/**
 * CONTROLADOR PRINCIPAL
 */
class App {
    constructor() {
        this.particles = new ParticleSystem(Utils.getElement("particleCanvas"));
        this.highScore = Utils.storage.get(CONFIG.STORAGE.HIGH_SCORE, 0);
        this.gamesPlayed = Utils.storage.get(CONFIG.STORAGE.GAMES_PLAYED, 0);
        this.speed = 80;
        this.mode = "classic";
        this.init();
    }

    init() {
        this.updateStats();
        this.bindEvents();
        this.renderParticles();
        if(Utils.isMobile()) Utils.getElement("mobileControls").classList.add("visible");
    }

    updateStats() {
        Utils.getElement("menuHighScore").textContent = this.highScore;
        Utils.getElement("menuGamesPlayed").textContent = this.gamesPlayed;
    }

    bindEvents() {
        Utils.getElement("startBtn").onclick = () => this.startGame();
        Utils.getElement("restartBtn").onclick = () => this.startGame();
        Utils.getElement("resumeBtn").onclick = () => {
            Utils.getElement("pauseOverlay").classList.remove("active");
            this.game.start();
        };
        
        document.querySelectorAll(".diff-btn").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                this.speed = parseInt(btn.dataset.speed);
            };
        });

        document.querySelectorAll(".mode-btn").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                this.mode = btn.dataset.mode;
            };
        });

        // Controles móviles
        const setupMobileBtn = (id, dir) => Utils.getElement(id).ontouchstart = (e) => { e.preventDefault(); this.game?.setDirection(dir); };
        setupMobileBtn("btnUp", "up"); setupMobileBtn("btnDown", "down");
        setupMobileBtn("btnLeft", "left"); setupMobileBtn("btnRight", "right");
        
        Utils.getElement("btnPause").onclick = () => {
            if(this.game.state === "playing") {
                this.game.state = "paused";
                Utils.getElement("pauseOverlay").classList.add("active");
            }
        };

        Utils.getElement("menuBtn").onclick = () => location.reload();
        Utils.getElement("pauseMenuBtn").onclick = () => location.reload();
    }

    async startGame() {
        Utils.getElement("mainContent").classList.add("hidden");
        Utils.getElement("gameWorld").classList.add("active");
        Utils.getElement("gameOver").classList.remove("active");

        this.game = new SnakeGame(Utils.getElement("gameCanvas"), {
            speed: this.speed,
            mode: this.mode,
            onScoreChange: (s) => Utils.getElement("scoreDisplay").textContent = s,
            onLevelUp: (l) => {
                Utils.getElement("levelDisplay").textContent = l;
                this.particles.emit(window.innerWidth/2, window.innerHeight/2, 40, "#00ff88");
            },
            onFoodEaten: (food) => {
                this.particles.emit(this.game.food.x * 20 + this.game.canvas.offsetLeft, this.game.food.y * 20 + this.game.canvas.offsetTop, 15, "#00f5ff");
            },
            onGameOver: (stats) => {
                this.gamesPlayed++;
                if (stats.score > this.highScore) {
                    this.highScore = stats.score;
                    Utils.storage.set(CONFIG.STORAGE.HIGH_SCORE, this.highScore);
                }
                Utils.storage.set(CONFIG.STORAGE.GAMES_PLAYED, this.gamesPlayed);
                Utils.getElement("finalScore").textContent = stats.score;
                Utils.getElement("gameOver").classList.add("active");
                this.updateStats();
            }
        });

        // Countdown
        const countEl = Utils.getElement("countdownNumber");
        Utils.getElement("countdownOverlay").classList.add("active");
        for(let i=3; i>0; i--) {
            countEl.textContent = i;
            await new Promise(r => setTimeout(r, 700));
        }
        Utils.getElement("countdownOverlay").classList.remove("active");
        
        this.game.start();
    }

    renderParticles() {
        let last = 0;
        const loop = (now) => {
            this.particles.update((now - last) / 1000);
            this.particles.draw();
            last = now;
            requestAnimationFrame(loop);
        };
        requestAnimationFrame(loop);
    }
}

// Iniciar aplicación
window.onload = () => new App();

// Efecto de mouse para el fondo
document.onmousemove = (e) => {
    document.documentElement.style.setProperty("--mouse-x", e.clientX + "px");
    document.documentElement.style.setProperty("--mouse-y", e.clientY + "px");
};
</script>
