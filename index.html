<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page con Chat en Vivo</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        
        /* Contenedor del Chat */
        #chat-window { width: 350px; height: 500px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        
        #header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        
        #mensajes-log { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .msg.otro { background: #e4e6eb; align-self: flex-start; }
        .msg.mio { background: #007bff; color: white; align-self: flex-end; }

        #input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        #input-mensaje { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 8px 15px; outline: none; }
        #btn-enviar { background: #007bff; border: none; color: white; margin-left: 10px; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-window">
    <div id="header">Chat en Vivo 🚀</div>
    <div id="mensajes-log"></div>
    <div id="input-area">
        <input type="text" id="input-mensaje" placeholder="Escribe un mensaje...">
        <button id="btn-enviar">></button>
    </div>
</div>

<script type="module">
    // 1. Importar Firebase desde CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. CONFIGURA TUS CREDENCIALES AQUÍ (Sustituye esto)
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "tu-proyecto.firebaseapp.com",
        projectId: "tu-proyecto-id",
        storageBucket: "tu-proyecto.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:123456789:web:abcdefgh"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const chatsRef = collection(db, "mensajes_chat");

    // 3. Generar un ID simple para diferenciar "mis" mensajes de "otros"
    const miID = "user_" + Math.floor(Math.random() * 1000);

    const inputMsg = document.getElementById('input-mensaje');
    const btnEnviar = document.getElementById('btn-enviar');
    const log = document.getElementById('mensajes-log');

    // 4. Función para ENVIAR mensajes
    const enviar = async () => {
        if (inputMsg.value.trim() === "") return;
        
        try {
            await addDoc(chatsRef, {
                texto: inputMsg.value,
                usuarioID: miID,
                fecha: serverTimestamp()
            });
            inputMsg.value = "";
        } catch (e) { console.error("Error al enviar: ", e); }
    };

    btnEnviar.onclick = enviar;
    inputMsg.onkeypress = (e) => { if(e.key === 'Enter') enviar(); };

    // 5. Función para ESCUCHAR mensajes en tiempo real
    const q = query(chatsRef, orderBy("fecha", "asc"));
    
    onSnapshot(q, (snapshot) => {
        log.innerHTML = ''; // Limpiar antes de repintar
        snapshot.forEach((doc) => {
            const data = doc.data();
            const div = document.createElement('div');
            
            // Si el ID coincide, es "mio" (azul), si no es "otro" (gris)
            div.classList.add('msg');
            div.classList.add(data.usuarioID === miID ? 'mio' : 'otro');
            div.textContent = data.texto;
            
            log.appendChild(div);
        });
        // Auto-scroll al último mensaje
        log.scrollTop = log.scrollHeight;
    });

</script>

</body>
</html>
