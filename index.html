<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Interactiva</title>
    <style>
        /* Estilos Globales */
        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Contenedor de la Terminal */
        .terminal-window {
            width: 90%;
            max-width: 700px;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
            overflow: hidden;
        }

        /* Cabecera de la Ventana */
        .terminal-header {
            background: #252525;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .dots { display: flex; gap: 8px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .terminal-title {
            color: #999;
            font-size: 13px;
            margin-left: 20px;
            flex-grow: 1;
            text-align: center;
        }

        /* Cuerpo de la Terminal */
        .terminal-body {
            padding: 20px;
            height: 350px;
            overflow-y: auto;
            color: #00ff41; /* Verde Matrix */
            font-size: 15px;
            line-height: 1.5;
        }

        .output-line { margin-bottom: 8px; }
        .response { color: #00d9ff; margin-bottom: 12px; } /* Azul para respuestas */

        /* Línea de entrada */
        .input-wrapper {
            display: flex;
            align-items: center;
        }

        .prompt {
            color: #888;
            margin-right: 10px;
            white-space: nowrap;
        }

        #userInput {
            background: transparent;
            border: none;
            color: #00ff41;
            outline: none;
            font-family: inherit;
            font-size: 15px;
            width: 100%;
        }

        /* Scrollbar Personalizado */
        .terminal-body::-webkit-scrollbar { width: 6px; }
        .terminal-body::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="dots">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <div class="terminal-title">bash — session@server</div>
    </div>
    
    <div class="terminal-body" id="terminalBody">
        <div class="output-line">SISTEMA DE GESTIÓN DE PERFILES v2.0.4</div>
        <div class="output-line">Escriba un apellido para consultar la base de datos...</div>
        <br>
        <div class="input-wrapper">
            <span class="prompt">user@dev:~$</span>
            <input type="text" id="userInput" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>
</div>

<script>
    const userInput = document.getElementById('userInput');
    const terminalBody = document.getElementById('terminalBody');

    // Base de datos de respuestas
    const database = {
        "guzman": "PERFIL ENCONTRADO: Gerente de TI. Especialista en arquitectura de software, experto en ecosistema Laravel y React UI.",
        "segovia": "PERFIL ENCONTRADO: Desarrollador Senior. Enfoque en optimización de sistemas y soluciones Full-Stack escalables.",
        "perez": "PERFIL ENCONTRADO: Analista Técnico. Especialidad en soporte e infraestructura de redes.",
        "hernandez": "PERFIL ENCONTRADO: Desarrollador Frontend. Experto en interfaces modernas y responsive design."
    };

    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const val = userInput.value.toLowerCase().trim();
            if (val === "") return;

            // 1. Mostrar lo que el usuario escribió
            const userLine = document.createElement('div');
            userLine.className = "output-line";
            userLine.innerHTML = `<span class="prompt">user@dev:~$</span> ${userInput.value}`;
            terminalBody.insertBefore(userLine, userInput.parentElement);

            // 2. Determinar respuesta
            const responseText = database[val] || `ERROR: El apellido "${userInput.value}" no tiene registros asociados en este servidor.`;
            
            // 3. Mostrar respuesta con efecto
            const responseLine = document.createElement('div');
            responseLine.className = "response";
            responseLine.textContent = `> ${responseText}`;
            terminalBody.insertBefore(responseLine, userInput.parentElement);

            // 4. Limpiar y bajar el scroll
            userInput.value = '';
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }
    });

    // Mantener el foco en el input siempre que se haga clic en la terminal
    document.querySelector('.terminal-window').addEventListener('click', () => {
        userInput.focus();
    });
</script>

</body>
</html>
