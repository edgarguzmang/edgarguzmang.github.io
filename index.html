<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Xbox 360 NXE Retro</title>
    <style>
        :root {
            --xbox-green: #94c11f;
            --bg-gradient: radial-gradient(circle at 50% 40%, #ff8c00 0%, #7d3c00 100%);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: white;
            overflow: hidden;
        }

        /* El fondo con círculos de la foto */
        .nx-background {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 0%, transparent 30%);
            z-index: 0;
        }

        .dashboard {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
            perspective: 1500px;
        }

        /* Texto superior "My Xbox" */
        .menu-title {
            position: absolute;
            left: 10%;
            top: 20%;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .carousel {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            transform-style: preserve-3d;
            margin-top: 50px;
        }

        .card {
            position: absolute;
            width: 350px;
            height: 480px;
            background: #fff;
            border-radius: 5px;
            transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            cursor: pointer;
            /* El reflejo de la foto */
            -webkit-box-reflect: below 2px linear-gradient(transparent 80%, rgba(255,255,255,0.15));
        }

        /* La tarjeta verde de perfil */
        .card.profile {
            background-color: var(--xbox-green);
            color: white;
        }

        .card img {
            width: 100%;
            height: 85%;
            object-fit: cover;
            border-bottom: 5px solid #eee;
        }

        .card-label {
            padding: 15px;
            color: #333;
            font-weight: bold;
            font-size: 18px;
        }

        .profile .card-label { color: white; }

        /* POSICIONAMIENTO TIPO NXE */
        /* La activa está al frente */
        .card.active {
            transform: translateZ(200px) translateX(-100px);
            z-index: 100;
            border: 4px solid #fff;
        }

        /* Las de la derecha se van apilando hacia atrás con rotación */
        .card.right-1 { transform: translateX(180px) translateZ(50px) rotateY(-30deg); z-index: 80; opacity: 0.9; }
        .card.right-2 { transform: translateX(380px) translateZ(-50px) rotateY(-35deg); z-index: 60; opacity: 0.7; }
        .card.right-3 { transform: translateX(550px) translateZ(-150px) rotateY(-40deg); z-index: 40; opacity: 0.5; }

        /* Las de la izquierda */
        .card.left-1 { transform: translateX(-450px) translateZ(50px) rotateY(30deg); z-index: 80; opacity: 0; }

        .controls {
            position: absolute;
            bottom: 10%;
            display: flex;
            gap: 20px;
        }

        .btn-xbox {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            text-transform: uppercase;
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="nx-background"></div>

    <div class="dashboard">
        <div class="menu-title">My Xbox</div>

        <div class="carousel" id="stage">
            <div class="card active">
                <img src="https://m.media-amazon.com/images/I/81S5u6vWfNL._AC_SL1500_.jpg" alt="">
                <div class="card-label">Play LEGO® Indiana Jones™</div>
            </div>

            <div class="card profile right-1">
                <div style="padding: 30px;">
                    <h2 id="dept_nombre">SISTEMAS</h2>
                    <p>Gamerscore: 2800 G</p>
                    <hr style="opacity: 0.3">
                    <p>Status: <b id="dept_estatus">Activo</b></p>
                    <p>Padre: <span id="dept_padre">Dirección</span></p>
                    <div style="font-size: 80px; margin-top: 50px; text-align: center;">👤</div>
                </div>
                <div class="card-label" style="position:absolute; bottom:0;">Signed In</div>
            </div>

            <div class="card right-2" style="background: #7dbd21;">
                <div class="card-label" style="color:white">Game Library</div>
            </div>

            <div class="card right-3" style="background: #00a4ef;">
                <div class="card-label" style="color:white">Video Marketplace</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-xbox" onclick="move(-1)">LB</button>
            <button class="btn-xbox" onclick="move(1)">RB</button>
        </div>
    </div>

    <script>
        let index = 0;
        const cards = document.querySelectorAll('.card');
        const classes = ['left-1', 'active', 'right-1', 'right-2', 'right-3'];

        function update() {
            cards.forEach((card, i) => {
                // Limpiar clases
                classes.forEach(c => card.classList.remove(c));
                
                // Calcular posición relativa al índice actual
                let pos = i - index;
                
                if (pos === 0) card.classList.add('active');
                else if (pos === 1) card.classList.add('right-1');
                else if (pos === 2) card.classList.add('right-2');
                else if (pos >= 3) card.classList.add('right-3');
                else if (pos === -1) card.classList.add('left-1');
                else card.style.opacity = "0"; // Ocultar el resto
            });
        }

        function move(dir) {
            index += dir;
            if (index < 0) index = 0;
            if (index > cards.length - 1) index = cards.length - 1;
            update();
        }

        // Teclas flechas
        document.addEventListener('keydown', (e) => {
            if(e.key === "ArrowRight") move(1);
            if(e.key === "ArrowLeft") move(-1);
        });
    </script>
</body>
</html>
