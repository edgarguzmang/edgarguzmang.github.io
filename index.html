<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox 360 Metro UI Responsive</title>
    <style>
        :root {
            --bg-dark: #2b2b2b;
            --xbox-green: #107c10;
            --text-gray: #a0a0a0;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background-color: var(--bg-dark);
            background: radial-gradient(circle at center, #404040 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', Segoe, Tahoma, Arial, sans-serif;
            color: white; overflow-x: hidden;
        }

        /* Contenedor Principal Centrado */
        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Menú Superior */
        .top-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-item {
            color: var(--text-gray);
            font-size: clamp(18px, 4vw, 24px);
            text-decoration: none;
            cursor: pointer;
            font-weight: 300;
            transition: 0.2s;
        }

        .nav-item.active {
            color: white;
            font-weight: bold;
            border-bottom: 3px solid white;
        }

        /* Layout Principal: Tiles + Avatar */
        .main-layout {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            justify-content: center;
        }

        /* Grid de los cuadros */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 140px;
            gap: 10px;
            flex-grow: 1;
            max-width: 900px;
        }

        /* Sección del Avatar a la derecha */
        .avatar-section {
            width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s;
        }

        .avatar-img {
            width: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .gamertag-box {
            text-align: center;
            margin-top: 10px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            width: 100%;
        }

        /* Tiles */
        .tile {
            background: #444;
            position: relative;
            overflow: hidden;
            border: 3px solid transparent;
            transition: 0.1s;
            cursor: pointer;
        }

        .tile:hover {
            border-color: white;
            transform: scale(1.02);
            z-index: 10;
        }

        .tile img { width: 100%; height: 100%; object-fit: cover; }
        
        .tile-label {
            position: absolute; bottom: 8px; left: 10px;
            font-size: 13px; font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
        }

        .tile-large { grid-column: span 2; grid-row: span 2; }
        .bg-green { background-color: var(--xbox-green); }

        /* RESPONSIVO PARA TELÉFONOS */
        @media (max-width: 850px) {
            .main-layout { flex-direction: column; align-items: center; }
            .grid-container { 
                grid-template-columns: repeat(2, 1fr); /* 2 columnas en celular */
                width: 100%;
            }
            .avatar-section { order: -1; width: 120px; } /* Avatar arriba en móvil */
            .tile-large { grid-column: span 2; grid-row: span 1; } /* Menos alto en móvil */
        }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

    <div class="dashboard">
        <nav class="top-nav">
            <span class="nav-item">bing</span>
            <span class="nav-item active">home</span>
            <span class="nav-item">social</span>
            <span class="nav-item">games</span>
            <span class="nav-item">apps</span>
            <span class="nav-item">settings</span>
        </nav>

        <div class="main-layout">
            <div class="grid-container">
                <div class="tile">
                    <img src="https://media.redadn.es/imagenes/fifa-13_150821.jpg">
                    <div class="tile-label">Play FIFA Soccer 13</div>
                </div>

                <div class="tile tile-large">
                    <img src="https://assets1.ignimgs.com/2012/09/05/halo-4-button-02jpg-046779.jpg">
                    <div class="tile-label">Halo 4</div>
                </div>

                <div class="tile bg-green">
                    <div style="display:flex; justify-content:center; align-items:center; height:100%; font-size:40px;">📌</div>
                    <div class="tile-label">My Pins</div>
                </div>

                <div class="tile bg-green">
                    <div style="display:flex; justify-content:center; align-items:center; height:100%; font-size:40px;">🕒</div>
                    <div class="tile-label">Recent</div>
                </div>

                <div class="tile">
                    <img src="https://m.media-amazon.com/images/M/MV5BMjA4NDg3NzYxMF5BMl5BanBnXkFtZTcwNjUxNjE3Nw@@._V1_.jpg">
                    <div class="tile-label">Movies</div>
                </div>
            </div>

            <aside class="avatar-section">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&clothingColor=107c10" alt="Avatar" class="avatar-img">
                <div class="gamertag-box">
                    <div style="font-weight: bold;">Athena360</div>
                    <div style="font-size: 12px; color: #ccc;">2800 G</div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // Lógica simple para cambiar de pestaña
        const tabs = document.querySelectorAll('.nav-item');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                // Aquí podrías cambiar el contenido del grid dinámicamente
            });
        });
    </script>
</body>
</html>
