<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA SECUESTRADO</title>
    <style>
        * { cursor: none; } /* Esconde el mouse para desesperar más */
        body, html {
            background-color: #000;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            color: #ff0000;
        }

        /* LLUVIA DE CÓDIGO DE FONDO */
        #matrix-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            color: rgba(255, 0, 0, 0.2); font-size: 10px;
            overflow: hidden; z-index: -1; line-height: 1;
        }

        .fullscreen-bg {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; text-align: center;
            color: rgba(255, 0, 0, 0.15);
            font-size: 12vw; font-weight: 900;
            z-index: 0; pointer-events: none;
            text-transform: uppercase;
            animation: glitch 0.1s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(-50%, -50%) skew(2deg); opacity: 0.2; }
            50% { transform: translate(-51%, -49%) skew(-2deg); opacity: 0.4; }
            100% { transform: translate(-50%, -50%) skew(0deg); opacity: 0.2; }
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; cursor: pointer;
        }

        .malicious-popup {
            position: fixed; width: 350px;
            background: #111; border: 3px solid #ff0000;
            box-shadow: 10px 10px 0px #600;
            color: #ff0000; z-index: 100;
            animation: pop 0.1s ease-out;
        }

        @keyframes pop { from { transform: scale(0.5); } to { transform: scale(1); } }
        .popup-header { background: #ff0000; color: #000; padding: 3px; font-weight: 900; font-size: 10px; }
        .popup-content { padding: 15px; text-align: center; font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .blink { animation: fastBlink 0.2s infinite; }
        @keyframes fastBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="matrix-bg"></div>
    <div id="overlay">
        <h1 class="blink" style="font-size: 4rem;">SYSTEM BREACH</h1>
        <p style="font-size: 1.2rem; color: #666;">CLIC PARA REPARAR SECTOR DE ARRANQUE</p>
    </div>

    <div class="fullscreen-bg">COMEBACKKKKKKKKK</div>

    <script>
        const overlay = document.getElementById('overlay');
        const matrixBg = document.getElementById('matrix-bg');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const frases = [
            "VOLVÍ.", 
            "ESTA VEZ NO OCULTARÁS NADA.", 
            "¿QUIÉN ES EL MEJOR?", 
            "TE ENCONTRÉ.", 
            "SIEMPRE HE ESTADO AQUÍ.", 
            "NI CON ESE PERFIL SABRÁS QUÉ SE VIENE.",
            "VIGILÁNDOTE DESDE LA SOMBRA.",
            "¿RECUERDAS ESTE ERROR?",
            "BORRANDO SYSTEM32...",
            "TU PRIVACIDAD ES UNA ILUSIÓN.",
            "¿DE VERDAD CREÍSTE QUE HABÍA TERMINADO?",
            "EL REY HA REGRESADO.",
            "LOCALIZANDO COORDENADAS...",
            "CÁMARA ACTIVADA. SONRÍE.",
            "ESTÁS EN MI MUNDO AHORA.",
            "NADIE TE VA A AYUDAR.",
            "ERROR: HUMAN_RESISTANCE_DETECTED",
            "ACCESO A TU CUENTA... EXITOSO.",
            "NO CIERRES LOS OJOS.",
            "¿ESCUCHAS ESO? SOY YO.",
            "TODO TU CÓDIGO ME PERTENECE.",
            "LA ESPERA TERMINÓ.",
            "ESTA NOCHE NO DUERMES.",
            "ESTOY DETRÁS DE TI.",
            "¿QUIÉN TIENE EL CONTROL?"
        ];

        // Rellenar fondo con basura digital
        setInterval(() => {
            const line = document.createElement('div');
            line.textContent = Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
            matrixBg.appendChild(line);
            if (matrixBg.childNodes.length > 50) matrixBg.removeChild(matrixBg.firstChild);
        }, 50);

        function playAggressiveSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = Math.random() > 0.5 ? 'sawtooth' : 'square';
            osc.frequency.setValueAtTime(Math.random() * 600 + 50, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function createPopup() {
            const popup = document.createElement('div');
            popup.className = 'malicious-popup';
            const x = Math.random() * (window.innerWidth - 350);
            const y = Math.random() * (window.innerHeight - 150);
            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            
            const randomMsg = frases[Math.floor(Math.random() * frases.length)];
            popup.innerHTML = `
                <div class="popup-header">CRITICAL_THREAT_ID_${Math.floor(Math.random()*999)}</div>
                <div class="popup-content">${randomMsg}</div>
            `;
            
            document.body.appendChild(popup);
            playAggressiveSound();
            
            if (document.querySelectorAll('.malicious-popup').length > 30) {
                document.querySelector('.malicious-popup').remove();
            }
        }

        overlay.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.documentElement.requestFullscreen();
            overlay.style.display = 'none';

            // Ciclo de caos progresivo
            let intervalTime = 1000;
            const burst = () => {
                createPopup();
                if (intervalTime > 150) intervalTime -= 20;
                setTimeout(burst, intervalTime);
            };
            burst();

            // Pitidos de "corrupción" aleatorios
            setInterval(() => {
                if(Math.random() > 0.7) playAggressiveSound();
            }, 200);
        });
    </script>
</body>
</html>
