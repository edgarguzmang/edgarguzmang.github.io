<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boss Terminal</title>
    <style>
        body {
            background-color: #0a0a0a;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* Evita scrolls raros */
        }

        /* TEXTO QUE OCUPA TODA LA PANTALLA */
        .fullscreen-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            color: rgba(0, 255, 65, 0.15); /* Verde muy tenue para que no estorbe la lectura */
            font-size: 12vw; /* Tamaño basado en el ancho de pantalla */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            z-index: 0; /* Va detrás de todo */
            pointer-events: none; /* Para que puedas hacer clic a través de él */
            white-space: nowrap;
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* CONTENEDOR DE LA TERMINAL */
        .terminal-window {
            position: relative;
            z-index: 10; /* Por encima del texto gigante */
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.85); /* Un poco de transparencia para ver el fondo */
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1), 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid #1a1a1a;
            backdrop-filter: blur(5px); /* Efecto cristal moderno */
            overflow: hidden;
        }

        .terminal-header {
            background: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }

        .dots { display: flex; gap: 8px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .terminal-title {
            color: #666;
            font-size: 12px;
            flex-grow: 1;
            text-align: center;
            letter-spacing: 1px;
        }

        .terminal-body {
            padding: 20px;
            height: 450px;
            overflow-y: auto;
            color: #00ff41;
            font-size: 16px;
            line-height: 1.6;
        }

        .output-line { margin-bottom: 5px; }
        .response { 
            color: #fff; 
            margin-bottom: 15px; 
            padding-left: 10px;
            border-left: 2px solid #00ff41;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .prompt { color: #00ff41; margin-right: 10px; font-weight: bold; }

        #userInput {
            background: transparent;
            border: none;
            color: #00ff41;
            outline: none;
            font-family: inherit;
            font-size: 16px;
            width: 100%;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

<div class="fullscreen-bg">COMEABACKKKKKKKKK</div>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="dots">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <div class="terminal-title">ROOT@ALEJANDRO-OS — SESSION_ACTIVE</div>
    </div>
    
    <div class="terminal-body" id="terminalBody">
        <div class="output-line">SISTEMA OPERATIVO PERSONALIZADO [V. 2026.03.06]</div>
        <div class="output-line">Cargando módulos de excelencia... OK.</div>
        <div class="output-line">Esperando órdenes...</div>
        <br>
        <div class="input-wrapper">
            <span class="prompt">admin@manager:~$</span>
            <input type="text" id="userInput" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>
</div>

<script>
    const userInput = document.getElementById('userInput');
    const terminalBody = document.getElementById('terminalBody');

    function getResponse(input) {
        const text = input.toLowerCase();
        if (text.includes("guzman")) return "El código fluye en sus venas. Un saludo al mejor.";
        if (text.includes("segovia")) return "Excelencia confirmada. Acceso total concedido.";
        if (text.includes("quien eres") || text.includes("quién eres")) return "Soy el núcleo del sistema. Inteligencia pura.";
        
        return `Comando "${input}" no reconocido. Intenta con algo que esté a mi altura.`;
    }

    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const val = userInput.value.trim();
            if (val === "") return;

            const userLine = document.createElement('div');
            userLine.className = "output-line";
            userLine.innerHTML = `<span class="prompt">admin@manager:~$</span> ${val}`;
            terminalBody.insertBefore(userLine, userInput.parentElement);

            const responseText = getResponse(val);
            const responseLine = document.createElement('div');
            responseLine.className = "response";
            responseLine.textContent = `[SISTEMA]: ${responseText}`;
            terminalBody.insertBefore(responseLine, userInput.parentElement);

            userInput.value = '';
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }
    });

    document.querySelector('.terminal-window').addEventListener('click', () => userInput.focus());
</script>

</body>
</html>
