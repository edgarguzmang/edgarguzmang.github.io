<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox 360 Metro UI Pro</title>
    <style>
        :root {
            --bg-dark: #2b2b2b;
            --xbox-green: #107c10;
            --text-gray: #a0a0a0;
            --tile-bg: #444;
        }

        body, html {
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #404040 0%, #1a1a1a 100%);
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            color: white; overflow-x: hidden;
        }

        /* Contenedor Principal Centrado */
        .dashboard {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; box-sizing: border-box;
        }

        /* Menú Superior */
        .top-nav {
            display: flex; gap: 25px; margin-bottom: 30px;
            flex-wrap: wrap; justify-content: center;
        }

        .nav-item {
            color: var(--text-gray); font-size: clamp(18px, 4vw, 24px);
            cursor: pointer; font-weight: 300; transition: 0.2s;
        }

        .nav-item.active { color: white; font-weight: bold; border-bottom: 3px solid white; }

        /* Layout: Tiles + Avatar */
        .main-layout {
            display: flex; align-items: flex-start; gap: 30px;
            max-width: 1100px; width: 100%; justify-content: center;
        }

        /* Grid de los cuadros */
        .grid-container {
            display: grid; grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 150px; gap: 12px; flex-grow: 1;
        }

        /* Avatar Section */
        .avatar-aside {
            width: 220px; text-align: center;
            animation: slideLeft 0.8s ease-out;
        }

        .avatar-img {
            width: 100%; max-width: 200px;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
        }

        .gamertag-card {
            background: rgba(255,255,255,0.05); padding: 15px;
            border-left: 4px solid var(--xbox-green); margin-top: 10px;
        }

        /* Tiles Estilo Metro */
        .tile {
            background: var(--tile-bg); position: relative; overflow: hidden;
            border: 3px solid transparent; transition: 0.15s; cursor: pointer;
        }

        .tile:hover { border-color: white; transform: scale(1.03); z-index: 10; }
        .tile img { width: 100%; height: 100%; object-fit: cover; }
        .tile-label { position: absolute; bottom: 10px; left: 12px; font-weight: bold; font-size: 14px; }
        .tile-large { grid-column: span 2; grid-row: span 2; }
        .bg-green { background-color: var(--xbox-green); }

        /* PANTALLA DE CONFIGURACIÓN (MODAL) */
        .settings-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; z-index: 1000;
            display: none; flex-direction: column; padding: 50px; box-sizing: border-box;
            animation: zoomIn 0.3s ease-out;
        }

        .settings-header { font-size: 48px; margin-bottom: 40px; font-weight: 100; border-bottom: 1px solid #444; }
        
        .settings-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;
        }

        .setting-item {
            padding: 20px; background: #333; border: 2px solid transparent; cursor: pointer;
        }
        .setting-item:hover { background: var(--xbox-green); border-color: white; }

        .btn-close {
            position: absolute; top: 30px; right: 50px;
            background: none; border: 2px solid white; color: white;
            padding: 10px 20px; cursor: pointer; border-radius: 20px;
        }

        /* RESPONSIVO */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; align-items: center; }
            .grid-container { grid-template-columns: repeat(2, 1fr); width: 100%; }
            .avatar-aside { order: -1; width: 150px; }
            .tile-large { grid-row: span 1; }
        }

        @keyframes slideLeft { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="dashboard">
        <nav class="top-nav">
            <span class="nav-item">bing</span>
            <span class="nav-item active">home</span>
            <span class="nav-item">social</span>
            <span class="nav-item">games</span>
            <span class="nav-item" onclick="openSettings()">settings</span>
        </nav>

        <div class="main-layout">
            <div class="grid-container">
                <div class="tile">
                    <img src="https://media.redadn.es/imagenes/fifa-13_150821.jpg">
                    <div class="tile-label">Play FIFA Soccer 13</div>
                </div>

                <div class="tile tile-large">
                    <img src="https://assets1.ignimgs.com/2012/09/05/halo-4-button-02jpg-046779.jpg">
                    <div class="tile-label">Halo 4</div>
                </div>

                <div class="tile bg-green" onclick="openSettings()">
                    <div style="display:flex; justify-content:center; align-items:center; height:100%; font-size:50px;">⚙️</div>
                    <div class="tile-label">System Settings</div>
                </div>

                <div class="tile bg-green">
                    <div style="display:flex; justify-content:center; align-items:center; height:100%; font-size:50px;">📌</div>
                    <div class="tile-label">My Pins</div>
                </div>

                <div class="tile">
                    <img src="https://i.scdn.co/image/ab67616d0000b27376043ef5871f308a0d0bc48f">
                    <div class="tile-label">Music</div>
                </div>
            </div>

            <aside class="avatar-aside">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&clothingColor=107c10&mouth=smile" class="avatar-img" alt="Avatar">
                <div class="gamertag-card">
                    <div style="font-size: 22px; font-weight: bold;">Athena360</div>
                    <div style="color: var(--xbox-green); font-weight: bold; letter-spacing: 1px;">2800 G</div>
                </div>
            </aside>
        </div>
    </div>

    <div id="settingsScreen" class="settings-overlay">
        <button class="btn-close" onclick="closeSettings()">Volver (B)</button>
        <h1 class="settings-header">system settings</h1>
        
        <div class="settings-grid">
            <div class="setting-item">
                <h3>Console Settings</h3>
                <p>Display, Audio, Language</p>
            </div>
            <div class="setting-item">
                <h3>Network Settings</h3>
                <p>Wi-Fi and Ethernet</p>
            </div>
            <div class="setting-item">
                <h3>Storage</h3>
                <p>Manage hard drives</p>
            </div>
            <div class="setting-item">
                <h3>Account</h3>
                <p>Privacy and Profile</p>
            </div>
        </div>
    </div>

    <script>
        function openSettings() {
            document.getElementById('settingsScreen').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settingsScreen').style.display = 'none';
        }

        // Cerrar con la tecla Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeSettings();
        });
    </script>
</body>
</html>
