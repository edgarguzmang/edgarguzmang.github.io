<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALERTA DE SISTEMA</title>
    <style>
        * { cursor: crosshair; }
        body, html {
            background-color: #000;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            color: #ff0000;
        }

        /* CAPA INICIAL PARA FORZAR EL PERMISO DEL NAVEGADOR */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        .btn-hacking {
            padding: 20px 40px;
            border: 2px solid #ff0000;
            background: transparent;
            color: #ff0000;
            font-size: 2rem;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 15px #ff0000;
        }

        .btn-hacking:hover {
            background: #ff0000;
            color: #000;
        }

        .fullscreen-bg {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; text-align: center;
            color: rgba(255, 0, 0, 0.15);
            font-size: 15vw; font-weight: 900;
            z-index: 0; pointer-events: none;
            text-transform: uppercase;
            animation: glitch 0.1s infinite;
            display: none;
        }

        @keyframes glitch {
            0% { transform: translate(-50%, -50%) skew(5deg); opacity: 0.2; }
            50% { transform: translate(-52%, -48%) skew(-5deg); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) skew(0deg); opacity: 0.2; }
        }

        .malicious-popup {
            position: fixed; width: 350px;
            background: #111; border: 3px solid #ff0000;
            box-shadow: 10px 10px 0px #600;
            color: #ff0000; z-index: 100;
        }

        .popup-header { background: #ff0000; color: #000; padding: 5px; font-weight: 900; font-size: 10px; }
        .popup-content { padding: 15px; text-align: center; font-size: 18px; font-weight: bold; }
        .blink { animation: fastBlink 0.2s infinite; }
        @keyframes fastBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="bloqueo">
        <button class="btn-hacking blink" onclick="lanzarAtaque()">[ EJECUTAR REPARACIÓN ]</button>
        <p style="margin-top: 20px; font-size: 0.9rem;">Se requiere interacción para restaurar protocolos de video.</p>
    </div>

    <div class="fullscreen-bg" id="bgText">COMEBACKKKKKKKKK</div>

    <script>
        const bgText = document.getElementById('bgText');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const frases = [
            "VOLVÍ.", "TE ENCONTRÉ.", "¿QUIÉN ES EL MEJOR?", 
            "ESTA VEZ NO OCULTARÁS NADA.", "SIEMPRE HE ESTADO AQUÍ.",
            "VIGILÁNDOTE.", "BORRANDO DATOS...", "SONRÍE A LA CÁMARA.",
            "¿CREÍSTE QUE HABÍA TERMINADO?", "NI CON ESE PERFIL SABRÁS QUÉ SE VIENE.",
            "ESTÁS EN MI MUNDO.", "SISTEMA COMPROMETIDO.", "NO PUEDES SALIR."
        ];

        function playSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(Math.random() * 400 + 100, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function createPopup() {
            const popup = document.createElement('div');
            popup.className = 'malicious-popup';
            const x = Math.random() * (window.innerWidth - 350);
            const y = Math.random() * (window.innerHeight - 150);
            popup.style.left = `${x}px`; popup.style.top = `${y}px`;
            
            const randomMsg = frases[Math.floor(Math.random() * frases.length)];
            popup.innerHTML = `
                <div class="popup-header">SYS_ERROR_CRITICAL</div>
                <div class="popup-content">${randomMsg}</div>
            `;
            document.body.appendChild(popup);
            playSound();
            if (document.querySelectorAll('.malicious-popup').length > 25) document.querySelector('.malicious-popup').remove();
        }

        function lanzarAtaque() {
            // ACTIVAR PANTALLA COMPLETA (Cross-browser)
            const el = document.documentElement;
            const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            
            if (rfs) {
                rfs.call(el).then(() => {
                    // Si entra en Fullscreen, quitamos el botón e iniciamos
                    document.getElementById('bloqueo').style.display = 'none';
                    bgText.style.display = 'block';
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    
                    // Iniciar lluvia de popups
                    setInterval(createPopup, 700);
                    // Ocultar cursor
                    document.body.style.cursor = 'none';
                }).catch(err => {
                    alert("Error al entrar en pantalla completa. Intenta de nuevo.");
                });
            }
        }
    </script>
</body>
</html>
