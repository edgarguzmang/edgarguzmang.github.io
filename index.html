<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Boss Terminal</title>
    <style>
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .terminal-window {
            width: 95%;
            max-width: 750px;
            background: #000;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid #1a1a1a;
            overflow: hidden;
        }

        .terminal-header {
            background: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            align-items: center;
        }

        .dots { display: flex; gap: 8px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .terminal-title {
            color: #666;
            font-size: 12px;
            flex-grow: 1;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .terminal-body {
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            color: #00ff41;
            font-size: 15px;
            line-height: 1.6;
        }

        .output-line { margin-bottom: 5px; }
        .response { 
            color: #fff; 
            margin-bottom: 15px; 
            padding-left: 10px;
            border-left: 2px solid #00ff41;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }

        .prompt { color: #00ff41; margin-right: 10px; font-weight: bold; }

        #userInput {
            background: transparent;
            border: none;
            color: #00ff41;
            outline: none;
            font-family: inherit;
            font-size: 15px;
            width: 100%;
        }

        /* Efecto de parpadeo al final */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

<div class="terminal-window">
    <div class="terminal-header">
        <div class="dots">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
        </div>
        <div class="terminal-title">Root-Access — Alejandro-OS</div>
    </div>
    
    <div class="terminal-body" id="terminalBody">
        <div class="output-line">SISTEMA OPERATIVO PERSONALIZADO [Versión 10.0.2026]</div>
        <div class="output-line">Iniciado para hacer tu día más feliz (si es que puedes con tanto).</div>
        <div class="output-line">Hazme una pregunta o escribe un nombre...</div>
        <br>
        <div class="input-wrapper">
            <span class="prompt">admin@manager:~$</span>
            <input type="text" id="userInput" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>
</div>

<script>
    const userInput = document.getElementById('userInput');
    const terminalBody = document.getElementById('terminalBody');

    // Lógica de respuestas con personalidad
    function getResponse(input) {
        const text = input.toLowerCase();

        // Respuestas por Nombre/Apellido
        if (text.includes("guzman")) return "Eres el mejor programador. Espero que estés bien, amigo. Sigue dominando el código.";
        if (text.includes("segovia")) return "El apellido del éxito. No aceptamos menos que la excelencia aquí.";
        
        // Respuestas de Personalidad (Arrogantes/Directas)
        if (text.includes("como te sientes") || text.includes("cómo te sientes") || text.includes("como estas")) {
            return "Me siento como alguien que sabe exactamente lo que hace. O sea, perfecto.";
        }
        
        if (text.includes("quien eres") || text.includes("quién eres")) {
            return "Soy la mente maestra detrás de este sistema. Un Gerente de TI que no pierde el tiempo.";
        }

        if (text.includes("que amas") || text.includes("qué amas")) {
            return "Amo el código limpio, los sistemas que no fallan y tener la razón. Casi siempre es lo mismo.";
        }

        if (text.includes("que odias") || text.includes("qué odias")) {
            return "Odio la incompetencia, el código mal indentado y que me hagan perder el tiempo con preguntas obvias.";
        }

        if (text.includes("hazme feliz") || text.includes("dia feliz") || text.includes("día feliz")) {
            return "Estás hablando conmigo, eso ya debería ser suficiente para mejorar tu día.";
        }

        // Respuesta por defecto
        return `Analizando "${input}"... No tengo tiempo para procesar eso. Intenta algo más interesante.`;
    }

    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const val = userInput.value.trim();
            if (val === "") return;

            // Mostrar comando del usuario
            const userLine = document.createElement('div');
            userLine.className = "output-line";
            userLine.innerHTML = `<span class="prompt">admin@manager:~$</span> ${val}`;
            terminalBody.insertBefore(userLine, userInput.parentElement);

            // Generar y mostrar respuesta
            const responseText = getResponse(val);
            const responseLine = document.createElement('div');
            responseLine.className = "response";
            responseLine.textContent = `[SISTEMA]: ${responseText}`;
            terminalBody.insertBefore(responseLine, userInput.parentElement);

            // Limpiar y scroll
            userInput.value = '';
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }
    });

    // Foco automático
    document.querySelector('.terminal-window').addEventListener('click', () => userInput.focus());
</script>

</body>
</html>
