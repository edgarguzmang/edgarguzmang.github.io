<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox 360 Dashboard Clone</title>
    <style>
        /* CSS - ESTILOS */
        :root {
            --orange-gradient: radial-gradient(circle at center, #ff8c00 0%, #8b4513 100%);
            --green-gradient: radial-gradient(circle at center, #7dbd21 0%, #2e4d0a 100%);
            --blue-gradient: radial-gradient(circle at center, #00a4ef 0%, #003450 100%);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Fondo dinámico */
        .dashboard {
            background: var(--orange-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            transition: background 0.8s ease;
        }

        /* Capa de círculos decorativos tipo NXE */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        /* Encabezado de Usuario */
        .user-header {
            position: absolute;
            top: 40px;
            right: 10%;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: right;
        }

        .gamertag-info h2 { margin: 0; font-size: 24px; font-weight: 400; }
        .gamertag-info p { margin: 0; opacity: 0.8; font-size: 18px; }

        .avatar-frame {
            width: 60px;
            height: 60px;
            border: 3px solid white;
            background: #444;
            overflow: hidden;
        }

        /* Carrusel */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: 320px;
            height: 400px;
            background: white;
            border-radius: 4px;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            cursor: pointer;
            -webkit-box-reflect: below 10px linear-gradient(transparent 70%, rgba(255,255,255,0.1));
        }

        /* Estilo Tarjeta Verde (Perfil/Departamentos) */
        .card-profile {
            background-color: #94c11f;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        .profile-header {
            padding: 20px;
            background: rgba(0,0,0,0.2);
        }

        .profile-body {
            padding: 20px;
            flex-grow: 1;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            background: #444;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Estados de animación */
        .card.active {
            transform: translateZ(150px) translateX(0);
            z-index: 10;
            border: 5px solid white;
            opacity: 1;
        }

        .card.left {
            transform: translateX(-350px) rotateY(35deg) scale(0.8);
            z-index: 5;
            opacity: 0.6;
        }

        .card.right {
            transform: translateX(350px) rotateY(-35deg) scale(0.8);
            z-index: 5;
            opacity: 0.6;
        }

        .card.hidden {
            opacity: 0;
            transform: translateZ(-200px) scale(0.5);
            pointer-events: none;
        }

        /* Controles inferiores */
        .footer-controls {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 20px;
        }

        .btn {
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: white; color: black; }

        .theme-selector {
            position: absolute;
            bottom: 50px;
            left: 50px;
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="dashboard" id="mainBg">
        <div class="bg-overlay"></div>

        <header class="user-header">
            <div class="gamertag-info">
                <h2 id="displayTag">Athena360</h2>
                <p>2800 G</p>
            </div>
            <div class="avatar-frame">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Athena" width="100%" alt="Avatar">
            </div>
        </header>

        <div class="carousel-container">
            
            <div class="card active">
                <img src="https://m.media-amazon.com/images/I/81S5u6vWfNL._AC_SL1500_.jpg" alt="Game" style="width:100%; height:80%; object-fit:cover;">
                <div style="padding:15px; color: #333; font-weight: bold;">LEGO Indiana Jones</div>
            </div>

            <div class="card card-profile">
                <div class="profile-header">
                    <h3 style="margin:0">Mi Departamento</h3>
                </div>
                <div class="profile-body">
                    <h1 style="margin:0">Sistemas</h1>
                    <p>Padre: Dirección General</p>
                    <div class="status-badge">● ESTATUS: ACTIVO</div>
                    
                    <div style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 20px;">
                        <small>Última conexión: Hoy</small>
                    </div>
                </div>
            </div>

            <div class="card" style="background: #222; display: flex; align-items: center; justify-content: center;">
                <div style="text-align: center;">
                    <span style="font-size: 50px;">🎬</span>
                    <h3>Reproductor</h3>
                </div>
            </div>

            <div class="card" style="background: #444; display: flex; align-items: center; justify-content: center;">
                <div style="text-align: center;">
                    <span style="font-size: 50px;">⚙️</span>
                    <h3>Configuración</h3>
                </div>
            </div>

        </div>

        <div class="footer-controls">
            <button class="btn" onclick="move(-1)"> ⬅ LB </button>
            <button class="btn" onclick="move(1)"> RB ➡ </button>
        </div>

        <div class="theme-selector">
            <div class="dot" style="background: orange;" onclick="changeTheme('orange')"></div>
            <div class="dot" style="background: #7dbd21;" onclick="changeTheme('green')"></div>
            <div class="dot" style="background: #00a4ef;" onclick="changeTheme('blue')"></div>
        </div>
    </div>

    <script>
        /* JAVASCRIPT - LÓGICA DE MOVIMIENTO */
        let currentIndex = 0;
        const cards = document.querySelectorAll('.card');
        const mainBg = document.getElementById('mainBg');

        function updateCarousel() {
            cards.forEach((card, i) => {
                card.classList.remove('active', 'left', 'right', 'hidden');
                
                if (i === currentIndex) {
                    card.classList.add('active');
                } else if (i < currentIndex) {
                    card.classList.add('left');
                } else if (i > currentIndex) {
                    card.classList.add('right');
                }
                
                // Ocultar las que estén muy lejos para mejorar rendimiento
                if (Math.abs(i - currentIndex) > 1) {
                    card.classList.add('hidden');
                }
            });
        }

        function move(dir) {
            currentIndex += dir;
            // Loop o tope
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= cards.length) currentIndex = cards.length - 1;
            updateCarousel();
        }

        function changeTheme(color) {
            if(color === 'orange') mainBg.style.background = "var(--orange-gradient)";
            if(color === 'green') mainBg.style.background = "var(--green-gradient)";
            if(color === 'blue') mainBg.style.background = "var(--blue-gradient)";
        }

        // Permitir usar las flechas del teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") move(-1);
            if (e.key === "ArrowRight") move(1);
        });

        // Inicializar
        updateCarousel();
    </script>
</body>
</html>
