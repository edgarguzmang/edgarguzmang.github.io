<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA COMPROMETIDO</title>
    <style>
        body, html {
            background-color: #000;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff0000; /* Todo rojo de peligro */
        }

        /* FONDO DINÁMICO COMEBACK */
        .fullscreen-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            color: rgba(255, 0, 0, 0.05);
            font-size: 12vw;
            font-weight: 900;
            z-index: 0;
            pointer-events: none;
            white-space: nowrap;
            animation: glitchBg 0.1s infinite;
        }

        @keyframes glitchBg {
            0% { transform: translate(-50%, -50%) skew(0deg); opacity: 0.1; }
            50% { transform: translate(-50.5%, -49.5%) skew(2deg); opacity: 0.2; }
            100% { transform: translate(-50%, -50%) skew(0deg); opacity: 0.1; }
        }

        /* CONTENEDOR DE LA TERMINAL DE ERROR */
        .terminal-window {
            position: relative;
            z-index: 10;
            width: 80%;
            max-width: 800px;
            background: rgba(10, 0, 0, 0.95);
            border: 2px solid #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: #ff0000;
            color: #000;
            padding: 5px 15px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .terminal-body {
            padding: 20px;
            height: 400px;
            overflow-y: hidden;
            font-size: 18px;
            line-height: 1.4;
            text-shadow: 0 0 5px #ff0000;
        }

        /* ESTILO DE LOS MENSAJES QUE APARECEN */
        .msg-alert { color: #fff; font-weight: bold; background: #ff0000; display: inline-block; padding: 0 5px; margin-bottom: 5px; }
        .msg-critical { color: #ff0000; margin-bottom: 8px; }

        /* POPUPS MALICIOSOS MEJORADOS */
        .malicious-popup {
            position: fixed;
            width: 350px;
            background: #000;
            border: 3px solid #ff0000;
            box-shadow: 15px 15px 0px rgba(255, 0, 0, 0.3);
            color: #ff0000;
            z-index: 100;
            padding: 0;
            animation: popupIn 0.2s ease-out;
        }

        @keyframes popupIn {
            from { transform: scale(0.8) rotate(5deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .popup-header { background: #ff0000; color: #000; padding: 4px; font-weight: bold; text-align: center; }
        .popup-content { padding: 20px; text-align: center; font-size: 20px; font-weight: 900; text-transform: uppercase; }

        .blink { animation: fastBlink 0.3s infinite; }
        @keyframes fastBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="fullscreen-bg">COMEBACKKKKKKKKK</div>

    <div class="terminal-window" id="terminal">
        <div class="terminal-header">
            <span>SISTEMA SECUESTRADO - ACCESO TOTAL</span>
            <span>X</span>
        </div>
        <div class="terminal-body" id="logBody">
            <div class="msg-alert">INYECCIÓN DE CÓDIGO COMPLETADA</div><br>
            <div class="msg-critical">> Analizando perfil del usuario... [OK]</div>
            <div class="msg-critical">> ¿QUIÉN ES EL MEJOR? ... [BUSCANDO]</div>
        </div>
    </div>

    <script>
        const logBody = document.getElementById('logBody');
        
        const frasesAtaque = [
            "VOLVÍ.",
            "ESTA VEZ NO OCULTARÁS NADA.",
            "¿QUIÉN ES EL MEJOR?",
            "NI CON ESE PERFIL SABRÁS QUÉ SE VIENE.",
            "SIEMPRE HE ESTADO AQUÍ.",
            "TE ENCONTRÉ.",
            "NO TIENES ESCAPATORIA.",
            "ACCEDIENDO A ARCHIVOS PRIVADOS...",
            "BORRANDO RASTROS DE SEGURIDAD...",
            "EL SISTEMA ME PERTENECE."
        ];

        // Función para escribir mensajes en la terminal central
        function addLogEntry(text, isCritical = false) {
            const div = document.createElement('div');
            div.className = isCritical ? 'msg-critical' : 'msg-alert';
            div.innerHTML = `> ${text}`;
            logBody.appendChild(div);
            if (logBody.childNodes.length > 15) logBody.removeChild(logBody.firstChild);
        }

        // Crear popups en posiciones aleatorias
        function spawnPopup() {
            const phrase = frasesAtaque[Math.floor(Math.random() * frasesAtaque.length)];
            const popup = document.createElement('div');
            popup.className = 'malicious-popup';
            
            const x = Math.random() * (window.innerWidth - 350);
            const y = Math.random() * (window.innerHeight - 200);
            
            popup.style.left = `${x}px`;
            popup.style.top = `${y}px`;
            
            popup.innerHTML = `
                <div class="popup-header">ERROR_CRÍTICO</div>
                <div class="popup-content ${Math.random() > 0.5 ? 'blink' : ''}">
                    ${phrase}
                </div>
            `;
            
            document.body.appendChild(popup);
            addLogEntry(phrase, true);

            // Eliminar popups viejos para no saturar la memoria si se deja mucho tiempo
            if (document.querySelectorAll('.malicious-popup').length > 15) {
                document.querySelector('.malicious-popup').remove();
            }
        }

        // Secuencia de inicio
        setTimeout(() => {
            // Empieza lento y acelera
            let speed = 1500;
            const sequence = () => {
                spawnPopup();
                if (speed > 200) speed -= 100; // Se vuelve más frenético
                setTimeout(sequence, speed);
            };
            sequence();
        }, 1000);

        // Efecto de ruido en la terminal
        setInterval(() => {
            const terminal = document.getElementById('terminal');
            terminal.style.transform = `translate(${Math.random()*4-2}px, ${Math.random()*4-2}px)`;
        }, 50);

    </script>
</body>
</html>
